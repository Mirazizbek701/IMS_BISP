services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: malika_tech_sql
    hostname: sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"       
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "763m44c44V"   
      MSSQL_PID: "Developer"                       
    volumes:
      - sqlserver_data:/var/opt/mssql              
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  sqlserver_data: